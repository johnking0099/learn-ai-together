---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/pa/claude-opus-4-6
          api_base: os.environ/ANTHROPIC_BASE_URL
          api_key: os.environ/ANTHROPIC_AUTH_TOKEN
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/pa/claude-sonnet-4-6
          api_base: os.environ/ANTHROPIC_BASE_URL
          api_key: os.environ/ANTHROPIC_AUTH_TOKEN
      - model_name: claude-haiku-4-5-20251001
        litellm_params:
          model: anthropic/pa/claude-haiku-4-5-20251001
          api_base: os.environ/ANTHROPIC_BASE_URL
          api_key: os.environ/ANTHROPIC_AUTH_TOKEN
      - model_name: glm-5
        litellm_params:
          model: openai/glm-5
          api_base: os.environ/OPENAI_BASE_URL
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          supports_reasoning: false
      - model_name: kimi-k2-5
        litellm_params:
          model: openai/kimi-k2.5
          api_base: os.environ/OPENAI_BASE_URL
          api_key: os.environ/OPENAI_API_KEY
        model_info:
          supports_reasoning: false

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY

    litellm_settings:
      drop_params: true
      num_retries: 2
      use_chat_completions_url_for_anthropic_messages: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
        for-restart: "1"
    spec:
      containers:
        - name: litellm
          image: litellm/litellm:v1.82.6-nightly
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
          env:
            - name: LITELLM_LOG
              value: "DEBUG"
            - name: LITELLM_MASTER_KEY
              value: "sk-litellm-password"
            - name: ANTHROPIC_BASE_URL
              value: "https://your-api-provider.com/anthropic"
            - name: ANTHROPIC_AUTH_TOKEN
              value: "sk-your-api-key"
            - name: OPENAI_BASE_URL
              value: "https://your-openai-provider.com/v1"
            - name: OPENAI_API_KEY
              value: "sk-your-openai-key"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: litellm
spec:
  type: NodePort
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30040
